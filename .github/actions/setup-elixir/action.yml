name: "Setup Elixir with caching"
description: "Set up Erlang/Elixir and restore Mix build caches"

inputs:
  elixir-version:
    description: "Elixir version"
    required: true
  otp-version:
    description: "OTP version"
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ inputs.elixir-version }}
        otp-version: ${{ inputs.otp-version }}

    - name: Restore Mix cache
      uses: actions/cache@v5
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-

    - name: Install dependencies
      shell: bash
      run: mix deps.get
